{% load tailwind_tags %}
{% tailwind_css %}
{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>
    <div class='min-h-screen flex justify-center items-center'>
        <div class='bg-white p-8 rounded-2xl shadow-lg w-full max-w-md'>
            <form method="POST" action="{% url 'signup' %}">
                    {% csrf_token %}

                    <h1 class='font-bold text-4xl text-center m-4 text-gray-800'>Create Your Account</h1>
                    <p class='text-xl text-center text-gray-500 m-4'>Join us today, it's free!</p>

                    <label class='block text-gray-700 text-sm font-semibold mb-2'>
                        Username
                    </label>
                    <input type="text" 
                        name="username"         
                        placeholder="Enter your username" 
                        required 
                        class='focus:ring-2 focus:ring-blue-500 border border-gray-300 rounded-lg 
                        px-4 py-3 mb-4 w-full focus:outline-none'>

                    <label class='block text-gray-700 text-sm font-semibold mb-2'>
                        Email
                    </label>

                    <input type="email"    
                        name="email"             
                        placeholder="Email" 
                        required
                        class='focus:ring-2 focus:ring-blue-500 border border-gray-300 rounded-lg 
                        px-4 py-3 mb-4 w-full focus:outline-none'>

                    <label class='block text-gray-700 text-sm font-semibold mb-2'>
                        Password
                    </label>
                    
                    <input type="password"
                        name="password"          
                        placeholder="Password" 
                        required
                        class='focus:ring-2 focus:ring-blue-500 border border-gray-300 rounded-lg 
                        px-4 py-3 mb-4 w-full focus:outline-none'>

                    <label class='block text-gray-700 text-sm font-semibold mb-2'>
                        Confirm Password
                    </label>

                    <input type="password" 
                        name="confirmpassword"  
                        placeholder="Confirm password" 
                        required
                        class='focus:ring-2 focus:ring-blue-500 border border-gray-300 rounded-lg 
                        px-4 py-3 mb-4 w-full focus:outline-none'>

                    {% if error %}
                        <p style="color:red;">{{ error }}</p>
                    {% endif %}

                    
                    <a href="{% url 'login' %}">Already have an account? Login</a>
                    <button type="submit" class='w-full bg-blue-500 hover:bg-blue-700 rounded-lg transition px-4 py-3 mt-4'>Sign Up</button>
                </form>
        </div>
    </div>
    
</body>
</html>
